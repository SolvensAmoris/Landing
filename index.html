<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solvens Amoris</title>
    <meta name="description" content="Tecnología · Conciencia · Magia · Destino">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.6);
            --purple-light: #c8a8ff;
            --purple-dark: #2a0a4a;
            --purple-glow: rgba(142, 68, 173, 0.6);
            --bg-dark: #06010f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            color: #e8dcc8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* AQUÍ DEBES PONER TU IMAGEN DE FONDO (Sin los botones, solo la textura) */
            background-image: radial-gradient(circle at top, #1a053a 0%, #06010f 70%); 
            background-size: cover;
            background-position: center top;
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }

        /* --- Header --- */
                header {
            text-align: center;
            /* Margen normal para móviles */
            margin-top: 40px; 
            margin-bottom: 40px;
        }

        /* Le decimos al navegador que si la pantalla es grande (PC/Tablet), aumente el espacio */
        @media (min-width: 768px) {
            header {
                margin-top: 180px;
            }
        }


        h1.title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3.5rem;
            color: var(--gold);
            text-shadow: 0 0 20px var(--gold-glow);
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: var(--purple-light);
            opacity: 0.8;
            text-transform: uppercase;
        }

        /* --- Enlaces / Botones --- */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 50px;
        }

        .link-card {
            position: relative;
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: 20px 25px;
            background: rgba(10, 2, 20, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
            overflow: hidden;
            clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px), calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
        }

        /* Variaciones de color por botón */
        .link-card.gold {
            border-color: rgba(212, 175, 55, 0.3);
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.1);
        }
        .link-card.purple {
            border-color: rgba(142, 68, 173, 0.3);
            box-shadow: inset 0 0 15px rgba(142, 68, 173, 0.1);
        }

        .link-card:hover {
            transform: translateY(-3px);
        }

        .link-card.gold:hover {
            border-color: var(--gold);
            box-shadow: 0 0 25px var(--gold-glow), inset 0 0 20px var(--gold-glow);
        }

        .link-card.purple:hover {
            border-color: var(--purple-light);
            box-shadow: 0 0 25px var(--purple-glow), inset 0 0 20px var(--purple-glow);
        }

        /* Iconos de los botones */
        .icon {
            font-size: 1.8rem;
            margin-right: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .link-card.gold .icon { color: var(--gold); }
        .link-card.purple .icon { color: var(--purple-light); }

        /* Textos de los botones */
        .text-group {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .main-text {
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            letter-spacing: 2px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .link-card.gold .main-text { color: var(--gold); }
        .link-card.purple .main-text { color: #e8dcc8; }

        .sub-text {
            font-size: 0.65rem;
            letter-spacing: 1px;
            color: rgba(232, 220, 200, 0.6);
            text-transform: uppercase;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            margin-top: auto;
            padding-bottom: 30px;
            width: 100%;
        }

        .quote {
            font-family: 'Cinzel Decorative', serif;
            color: var(--gold);
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        .moon-phases {
            font-size: 1.2rem;
            letter-spacing: 10px;
            margin-bottom: 25px;
            opacity: 0.6;
            color: var(--purple-light);
        }
