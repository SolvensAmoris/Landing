<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solvens Amoris</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #d4af37;
            --purple-light: #c8a8ff;
            --bg-dark: #06010f;
        }

        /* 1. RESET ESTRICTO para evitar márgenes fantasma */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            /* Fondo que ya te está funcionando */
            background-image: radial-gradient(circle at top center, #1a053a 0%, #06010f 80%); 
            background-size: cover;
            background-attachment: fixed;
            color: #e8dcc8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden; /* Evita scroll horizontal roto */
        }

        /* 2. CONTENEDOR BLINDADO - Obligamos a que esté por encima del fondo */
        .container {
            width: 100%;
            max-width: 500px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative; 
            z-index: 10; 
        }

        header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 35px;
            width: 100%;
        }

        /* En PC damos más espacio para el astrolabio */
        @media (min-width: 768px) {
            header { margin-top: 140px; }
        }

        h1.title {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(2.2rem, 8vw, 3.5rem); /* Se adapta al tamaño del celular */
            color: var(--gold);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            margin-bottom: 8px;
            line-height: 1.1;
        }

        .tagline {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--purple-light);
            text-transform: uppercase;
            opacity: 0.8;
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        /* 3. BOTONES OPTIMIZADOS PARA MÓVIL */
        .link-card {
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: 16px 20px;
            background: rgba(10, 2, 20, 0.75);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px; /* Más seguro en móviles que el clip-path */
            transition: all 0.3s ease;
        }

        .link-card.gold { border-color: rgba(212, 175, 55, 0.3); }
        .link-card.purple { border-color: rgba(142, 68, 173, 0.3); }

        .link-card:active { transform: scale(0.98); } /* Efecto click al tocar */
